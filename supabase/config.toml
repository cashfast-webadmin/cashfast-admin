# Supabase project config for cashfast-admin
# See: https://supabase.com/docs/guides/cli/config

project_id = "cashfast-admin"

[api]
port = 54321
schemas = ["public", "authz", "storage", "graphql_public"]
extra_search_path = ["public", "authz", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/*"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
